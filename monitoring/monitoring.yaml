apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 58.0.0
    helm:
      values: |
        # 1. Cấu hình Prometheus
        prometheus:
          enabled: true
          prometheusSpec:
            retention: 3d
            # Chuyển resources vào bên trong prometheusSpec mới đúng chuẩn
            resources:
              requests:
                cpu: 500m
                memory: 512Mi
              limits:
                cpu: 1000m
                memory: 1Gi
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: local-path
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 5Gi

        # 2. Cấu hình Grafana
        grafana:
          enabled: true
          adminPassword: admin123
          persistence:
            enabled: true
            storageClassName: local-path
            size: 1Gi
          service:
            type: NodePort
            nodePort: 32000
          datasources:
            datasources.yaml:
              apiVersion: 1
              datasources:
                - name: Prometheus-Manual
                  type: prometheus
                  url: http://prometheus-operated.monitoring.svc:9090
                  isDefault: false
                - name: Loki
                  type: loki
                  url: http://loki.logging:3100
                  isDefault: false

        # 3. Cấu hình Alertmanager
        alertmanager:
          enabled: true
          alertmanagerSpec:
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: local-path
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 1Gi

        # 4. Node Exporter
        prometheus-node-exporter:
          enabled: true
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
      - ServerSideApply=true # Thêm cái này để xử lý CRD tốt hơn
    automated:
      prune: true
      selfHeal: true
