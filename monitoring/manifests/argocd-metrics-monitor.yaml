apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: argocd-notifications-monitor
  namespace: monitoring # Đặt vào namespace chứa Prometheus
  labels:
    release: monitoring # QUAN TRỌNG: Phải khớp với label 'release' của Prometheus Stack bạn cài
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-notifications-controller # Khớp với Service của ArgoCD Notifications
  namespaceSelector:
    matchNames:
      - argocd # Namespace nơi ArgoCD đang chạy
  endpoints:
  - port: metrics # Tên port định nghĩa trong Service của ArgoCD
    interval: 30s